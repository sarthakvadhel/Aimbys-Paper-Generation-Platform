name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore
        run: dotnet restore Aimbys.slnx

      - name: Build
        run: dotnet build Aimbys.slnx -c Release --no-restore -warnaserror

      - name: Test
        run: dotnet test Aimbys.slnx -c Release --no-build --verbosity normal
        if: hashFiles('**/*Tests*.csproj') != ''
